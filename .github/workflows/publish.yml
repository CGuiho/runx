name: Publish

on:
  push:
    tags:
      - '@guiho/runx@*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binaries
      - run: bun run verify-assets

      - name: Publish native binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(bun -e "const p = await Bun.file('./package.json').json(); console.log(p.version)")
          RELEASE_FLAGS=()

          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi

          bun run devops/extract-release-notes.ts "$VERSION" release-notes.md

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md "${RELEASE_FLAGS[@]}"
            gh release upload "${GITHUB_REF_NAME}" bin/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/* --title "${GITHUB_REF_NAME}" --notes-file release-notes.md --verify-tag "${RELEASE_FLAGS[@]}"
          fi

      - name: Verify exact GitHub release asset set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > expected-assets.txt <<'EOF'
          guiho-i-runx.md
          guiho-s-runx.md
          runx-darwin-arm64
          runx-darwin-x64
          runx-darwin-x64-baseline
          runx-darwin-x64-modern
          runx-linux-arm64
          runx-linux-x64
          runx-linux-x64-baseline
          runx-linux-x64-modern
          runx-windows-arm64.exe
          runx-windows-x64-baseline.exe
          runx-windows-x64-modern.exe
          runx-windows-x64.exe
          EOF
          gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | sort > actual-assets.txt
          diff -u expected-assets.txt actual-assets.txt

      - name: Set up npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.17.0

      - name: Publish package to npm
        run: npm publish --access public
