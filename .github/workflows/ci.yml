name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binary
      - run: bun run binaries
      - run: bun run verify-assets
      - name: Verify npm bootstrap parses under Node
        run: node --check scripts/runx-bin.mjs
      - name: Verify public Linux installer
        run: |
          expected_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          public_home="$(mktemp -d)"
          project_dir="$(mktemp -d)"
          install_dir="$public_home/.local/bin"
          trap 'rm -rf "$public_home" "$project_dir"' EXIT
          export HOME="$public_home"
          export RUNX_INSTALL_DIR="$install_dir"
          export RUNX_SKIP_PATH_UPDATE=1
          cd "$project_dir"
          curl -fsSL https://raw.githubusercontent.com/CGuiho/runx/main/devops/install.sh | bash
          test "$("$install_dir/runx" --version)" = "$expected_version"
          welcome="$("$install_dir/runx")"
          if [[ "$welcome" != "Hello Linux - runx v$expected_version" ]]; then
            printf '%s\n' "$welcome" | grep -q 'RUNX'
            printf '%s\n' "$welcome" | grep -q 'platform      Linux'
            printf '%s\n' "$welcome" | grep -q "version       v$expected_version"
          fi
          test -s "$HOME/.agents/skills/guiho-s-runx/SKILL.md"
          test -s "$HOME/.claude/skills/guiho-s-runx/SKILL.md"

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - run: bun run binary
      - name: Verify npm bootstrap parses under Node
        run: node --check scripts/runx-bin.mjs
