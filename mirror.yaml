# yaml-language-server: $schema=https://raw.githubusercontent.com/CGuiho/mirror/main/mirror/schema/mirror.schema.json
schema: 1
project:
  name_source: "package.json"
version:
  scheme: semver
  source: "package.json"
  output: ["package.json", "git"]
  prerelease_id: ""
package:
  path: "package.json"
  auxiliary_paths: []
jsr:
  path: "jsr.json"
git:
  tag_template: "{name}/v{version}"
  commit: true
  push: true
  allow_dirty: false
agents:
  write_changelog: true
  changelog_path: CHANGELOG.md
